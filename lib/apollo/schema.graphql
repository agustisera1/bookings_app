type Location {
  coordinates: [Float!]
  city: String
  country: String
  address: String
}

type Listing {
  _id: String!
  type: String!
  host_id: String!
  title: String!
  description: String!
  price: Int!
  location: Location
  photos: [String]
  rating_avg: Float
  rating: Float
  availabilityRange: [String]
}

type GuestBooking {
  type: String
  title: String
  created_at: String
  start_date: String
  end_date: String
  status: String
  total_price: Float
  id: ID
  guests: Int
}

input LocationInput {
  type: String
  coordinates: [Float]
  city: String
  country: String
  address: String
}

input FiltersInput {
  own: Boolean # non customer faced
  limit: Int
  type: String
  term: String
  location: LocationInput
  rating: Float
  availabilityRange: [String]
  priceRange: [Float]
}

type Query {
  listings(filters: FiltersInput): [Listing!]
  listing(listing_id: String!): Listing
  guestBookings: [GuestBooking]
}
