type Location {
  coordinates: [Float!]
  city: String
  country: String
  address: String
}

type Listing {
  _id: String!
  type: String!
  host_id: String!
  title: String!
  description: String!
  price: Int!
  location: Location
  photos: [String!]
  rating_avg: Float
}

type Query {
  listings(limit: Int, term: String): [Listing!]
  listing(listing_id: String!): Listing
}
